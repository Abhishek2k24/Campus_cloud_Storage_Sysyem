<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Cloud - Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 600px; margin: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .file-list { margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
        .file-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .logout { color: #d9534f; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container dashboard">
        <h2>Student Record</h2>
        <p>Logged in as: <strong>{{ session['user'] }}</strong></p>
        
        <nav>
            <a href="/upload">Upload New File</a> | 
            <a href="/logout" class="logout">Logout</a>
        </nav>

        <div class="file-list">
            <h3>Your Files</h3>
            {% if files %}
                {% for file in files %}
                    <div class="file-item">
                        <span>{{ file }}</span>
                        <a href="/download/{{ file }}">Download</a>
                        
                    </div>
                {% endfor %}
            {% else %}
                <p>No files uploaded yet.</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
